name: Build Docker Image

on:
  workflow_dispatch:
  push:
    paths:
      - 'docker/ci-container.Dockerfile'

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-docker-container:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Log in to registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tag
        id: location
        run: |
          IMAGE_PATH=$(echo "${{ github.repository_owner }}/ci-container" | tr '[:upper:]' '[:lower:]')
          echo "image_tag=${{ env.REGISTRY }}/${IMAGE_PATH}:latest" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: docker/ci-container.Dockerfile
          push: true
          tags: ${{ steps.location.outputs.image_tag }}

