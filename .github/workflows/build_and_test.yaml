name: Build and run tests with coverage.

permissions:
  contents: write
  pull-requests: write
  checks: write
  packages: read

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    container:
      image: ${{ vars.GLOBAL_BUILD_CONTAINER_URL }}:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Run Build and Tests
        env:
          CC: gcc-13
          CXX: g++-13
        run: |
          chmod +x $GITHUB_WORKSPACE/tools/build_and_run_tests.sh
          $GITHUB_WORKSPACE/tools/build_and_run_tests.sh -cov -cl

      - name: Publish Test Report
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: "$GITHUB_WORKSPACE/build/junit_reports/**/*.xml"
          comment_mode: always


      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: "$GITHUB_WORKSPACE/${{ vars.GLOBAL_REPORTS_DIR }}/coverage_report/coverage.xml"
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          verbose: true
