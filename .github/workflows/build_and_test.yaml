name: Build and run tests with coverage.

permissions:
  contents: write
  pull-requests: write
  checks: write

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "**" ] 

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake lcov g++-13 gcovr

      - name: Run Build and Tests
        env:
          CC: gcc-13
          CXX: g++-13
        run: |
          chmod +x ${{ github.workspace }}/tools/build_and_run_tests.sh
          ${{ github.workspace }}/tools/build_and_run_tests.sh -cov -cl

      - name: Publish Test Report
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: "${{ github.workspace }}/build/junit_reports/**/*.xml"
          comment_mode: always


      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: "${{ github.workspace }}/${{ vars.GLOBAL_REPORTS_DIR }}/coverage_report/coverage.xml"
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          verbose: true
        

